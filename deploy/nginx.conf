# TLS 1.3 only — reverse proxy for Next.js (port 3000).
# Replace startup-hunt.example and certificate paths before deploy.

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name startup-hunt.example;

    ssl_certificate     /etc/ssl/certs/startup-hunt.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/startup-hunt.key;

    # TLS 1.3 only
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name startup-hunt.example;
    return 301 https://$host$request_uri;
}
