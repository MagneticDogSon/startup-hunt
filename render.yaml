services:
  - type: web
    name: startup-hunt
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run db:seed && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        value: file:/var/data/prod.db
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false
      - key: ENFORCE_HTTPS
        value: "true"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: startup-hunt-data
      mountPath: /var/data
      sizeGB: 1
